name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to read-only at the workflow level. Without this, GitHub's
# default token has write permissions to the repo, which is dangerous on
# `pull_request` runs from untrusted forks.
permissions:
  contents: read

# Cancel in-progress runs on the same ref when a newer push lands. Without
# `cancel-in-progress`, every push to a busy PR queues another full run
# (test + verify-dist) and the older runs continue burning minutes after
# their commit is already obsolete. Explicit `group:` keys per-ref so two
# PRs don't cancel each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ledgermem/.github/.github/workflows/node-test.yml@main
    with:
      package-manager: npm
      node-version: "20"

  verify-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Ensure dist is up to date
        run: |
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the result."
            git diff dist/
            exit 1
          fi
