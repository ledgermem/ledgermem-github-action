name: "Mnemo"
description: "Add to or search a Mnemo workspace from a GitHub Actions workflow."
author: "Proofly"
branding:
  icon: "book-open"
  color: "purple"

inputs:
  api-key:
    description: "Mnemo API key. Use a secret like ${{ secrets.GETMNEMO_API_KEY }}."
    required: true
  workspace-id:
    description: "Target Mnemo workspace ID."
    required: true
  operation:
    description: "What to do: `add` or `search`."
    required: true
    default: "add"
  content:
    description: "Memory body. Required when operation=add."
    required: false
    default: ""
  query:
    description: "Search query. Required when operation=search."
    required: false
    default: ""
  limit:
    description: "Max results to return when operation=search."
    required: false
    default: "10"
  endpoint:
    description: "Override the API endpoint (e.g. for self-hosted deployments)."
    required: false
    default: "https://api.getmnemo.dev"
  metadata:
    description: "Optional JSON object to attach as metadata when operation=add."
    required: false
    default: "{}"

outputs:
  results:
    description: "JSON array of matching memories. Empty array when operation=add."
  memory-id:
    description: "ID of the created memory when operation=add. Empty when operation=search."

runs:
  using: "node20"
  main: "dist/index.js"
